<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./files/monogram.svg" type="image/ico">
    <title>Generar contraseñas seguras</title>
    <style>
        #char input{
            width: 100%;
            height: 24px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body style="display: flex; justify-content: center;">
    <div style="display: flex; flex-direction: column; align-items: center; overflow: hidden;">
        <h1>Genera contraseñas aleatorias</h1>
        <p id="generated-password">Click en "Generar"</p><br>
    
        <div>
            <button class="main-button" onclick="trigger()">Generar</button>
            <button class="secondary-button" onclick="copy()" id="copy-button">Copiar</button><br><br>
        </div>

        <div>
            <label for="symbol-checkbox">Incluir símbolos:</label>
            <input type="checkbox" class="chkb" id="symbol-checkbox" checked><br>

            <label for="uppercase-checkbox">Incluir mayúsculas:</label>
            <input type="checkbox" class="chkb" id="uppercase-checkbox" checked><br>
            
            <label for="lowercase-checkbox">Incluir minúsculas:</label>
            <input type="checkbox" class="chkb" id="lowercase-checkbox" checked><br>
            
            <label for="number-checkbox">Incluir números:</label>
            <input type="checkbox" class="chkb" id="number-checkbox" checked><br>
            
            <label>Longitud de caracteres:</label>
            <input type="range" min="4" max="36" id="input-caracters-length">
            <label for="input-caracters-length" id="label-from-length">12</label>
        </div>
        
        <div id="char"></div>
    </div>
    <script src="./src/js/main.js"></script>
    <script src="./src/styles/styles.js"></script>
</body>
</html>
